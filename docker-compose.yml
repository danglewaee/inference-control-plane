services:
  ollama:
    image: ollama/ollama@sha256:e23e6499890325d31f3454cdc83f7a613a2423c8a9e167bbafea0b0e3c27d7c6
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/bin/ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 20s

  model-seed:
    build: .
    working_dir: /app
    command: ["python", "scripts/seed_demo.py", "--ollama-url", "http://ollama:11434", "--config", "/app/config/backends.demo.json", "--warmup"]
    volumes:
      - ./:/app
      - control-plane-data:/data
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  control-plane:
    build: .
    working_dir: /app
    command: ["uvicorn", "control_plane.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      BACKENDS_CONFIG_PATH: /app/config/backends.demo.json
      CONTROL_PLANE_DB_PATH: /data/control_plane.db
      DEFAULT_POLICY: slo_aware
    volumes:
      - ./:/app
      - control-plane-data:/data
    ports:
      - "8000:8000"
    depends_on:
      model-seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  prometheus:
    image: prom/prometheus@sha256:4a61322ac1103a0e3aea2a61ef1718422a48fa046441f299d71e660a3bc71ae9
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.path=/prometheus"]
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      control-plane:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana@sha256:b0ae311af06228bcfd4a620504b653db80f5b91e94dc3dc2a5b7dab202bcde20
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/inference-control-plane.json
    volumes:
      - ./ops/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./ops/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

  demo-suite:
    build: .
    working_dir: /app
    command: ["python", "scripts/run_demo_suite.py", "--policy", "slo_aware", "--requests", "12", "--concurrency", "3"]
    profiles:
      - demo
    environment:
      CONTROL_PLANE_URL: http://control-plane:8000
    volumes:
      - ./:/app
      - control-plane-data:/data
    depends_on:
      control-plane:
        condition: service_healthy
    restart: "no"

volumes:
  ollama-data:
  control-plane-data:
